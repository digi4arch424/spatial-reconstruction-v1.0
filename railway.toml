# =============================================================================
# SPATIAL RECON — Railway Deployment Config
# Deploys the FastAPI API service from the repo root.
# Set environment variables in the Railway dashboard under Variables.
# =============================================================================

[build]
# Use the API service Dockerfile — build context is repo root
dockerfilePath = "services/api/Dockerfile"

[deploy]
# PORT is injected by Railway — do not hardcode
startCommand = "uvicorn services.api.main:app --host 0.0.0.0 --port $PORT --workers 2"

# Health check — Railway marks the deployment healthy once this returns 200
healthcheckPath    = "/health"
healthcheckTimeout = 30

# Restart policy
restartPolicyType = "ON_FAILURE"

# ── Required environment variables ───────────────────────────────────────────
# Set these in the Railway dashboard → Variables tab.
# Never commit real values here.
#
# DATABASE_URL   postgresql://postgres:[pw]@db.[ref].supabase.co:5432/postgres
# REDIS_URL      rediss://default:[pw]@[host].upstash.io:6379
# S3_ENDPOINT    https://[account].r2.cloudflarestorage.com
# S3_BUCKET      spatialrecon
# S3_ACCESS_KEY  [r2 access key]
# S3_SECRET_KEY  [r2 secret key]
# S3_REGION      auto
# ENVIRONMENT    production
